    <meta name="description" content="Compare preços e faça suas compras nos mercados do seu bairro. Rápido, fácil e com entrega." />

    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <meta property="og:title" content="O Entorno — Mercados do seu bairro" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Only register SW in production (not in iframes or preview hosts)
        var isInIframe = false;
        try { isInIframe = window.self !== window.top; } catch(e) { isInIframe = true; }
        var isPreview = location.hostname.includes('id-preview--') || location.hostname.includes('lovableproject.com');
        
        if (!isInIframe && !isPreview) {
          window.addEventListener('load', function() { navigator.serviceWorker.register('/sw.js'); });
        } else {
          // Unregister any stale SW in preview/iframe
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
      }
    </script>
  </body>
</html>
